# ============================================
# View 前端配置文件
# 分布式部署时修改此文件即可，无需改动代码
# 环境变量 (如 REDIS_HOST) 会覆盖此处的值
# ============================================

# --- Redis 连接配置 ---
# 用户认证数据、运行状态、地图数据均存储在 Redis
redis.host=localhost
redis.port=6379
redis.database=9
# 若 Redis 设置了密码，在此填写（留空表示无密码）
redis.password=

# Redis 连接池配置
redis.pool.maxTotal=50
redis.pool.maxIdle=10
redis.pool.minIdle=2
redis.pool.timeout=2000

# --- RabbitMQ 连接配置 ---
# 与后端 (controller/navigator/recorder) 通信的消息队列
rabbitmq.host=localhost
rabbitmq.port=5672
rabbitmq.username=guest
rabbitmq.password=guest
rabbitmq.vhost=/

# --- 日志配置 ---
# 日志输出目录（与 logback.xml 中的 ${log.dir} 对应）
log.dir=logs

# --- SQL Server 配置（预留） ---
sqlserver.host=localhost
sqlserver.port=1433
sqlserver.database=inspection
sqlserver.username=sa
sqlserver.password=
